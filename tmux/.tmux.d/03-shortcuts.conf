# prefix + r：重新加载配置
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# prefix + d：清屏并清空历史
bind d send-keys -R C-l \; clear-history

# Alt-3：切换弹出终端（独立 popup session）
bind-key -n -N 'Toggle popup window' M-3 if-shell -F '#{==:#{session_name},popup}' {
    detach-client
} {
    display-popup -d "#{pane_current_path}" -xC -yC -w 100% -h 100% -E \
        'tmux attach-session -t popup || tmux new-session -s popup'
}
